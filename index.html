<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JiangFJ-art | 个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        /* 头部样式（保持你现在的布局） */
        header {
            display: flex;
            align-items: center;
            gap: 2rem;
            padding: 2rem;
            background-color: #fff;
            border-radius: 10px;
            margin-bottom: 2rem;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #3498db;
        }
        .header-text h1 {
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }
        .header-text .subtitle {
            font-size: 1.2rem;
            color: #7f8c8d;
        }

        /* 👇 两个矩形并排核心代码 */
        .content-row {
            display: flex;
            gap: 2rem;
        }
        .box {
            flex: 1; /* 两个盒子等宽 */
            background-color: #fff;
            padding: 2.5rem;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
        }
        .box h2 {
            font-size: 2rem;
            color: #2c3e50;
            margin-bottom: 1rem;
        }
        .box p, .box li {
            font-size: 1.1rem;
            margin-bottom: 0.8rem;
        }
        .box ul {
            padding-left: 1.5rem;
        }
        a {
            color: #3498db;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img src="https://via.placeholder.com/100" alt="头像" class="avatar">
            <div class="header-text">
                <h1>你好，我是 JiangFJ-art</h1>
                <p class="subtitle">欢迎来到我的个人主页</p>
            </div>
        </header>

        <!-- 👇 两个矩形并排区域 -->
        <div class="content-row">
            <div class="box">
                <h2>关于我</h2>
                <p>这里可以写你的自我介绍、兴趣爱好或者职业信息。</p>
            </div>

                </ul>
                <h2>联系我</h2>
                <p>邮箱：your-email@example.com</p>
            </div>
        </div>
    </div>
</body>
