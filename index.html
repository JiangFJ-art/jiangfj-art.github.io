<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JiangFJ-art | 个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        /* 新增：头部布局改为 flex，实现头像+文字并排 */
        header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 2rem;
            background-color: #fff;
            border-radius: 8px;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        /* 头像样式 */
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #3498db;
        }
        .header-text {
            flex: 1;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #2c3e50;
        }
        .subtitle {
            font-size: 1.1rem;
            color: #7f8c8d;
        }
        .content {
            background-color: #fff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        a {
            color: #3498db;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <!-- 替换为你的头像链接 -->
            <img src="https://via.placeholder.com/80" alt="头像" class="avatar">
            <div class="header-text">
                <h1>你好，我是 JiangFJ-art</h1>
                <p class="subtitle">欢迎来到我的个人主页</p>
            </div>
        </header>
        <div class="content">
            <h2>关于我</h2>
            <p>这里可以写你的自我介绍、兴趣爱好或者职业信息。</p>
            <h2>我的项目</h2>
            <ul>
                <li><a href="https://github.com/JiangFJ-art" target="_blank">GitHub</a> - 查看我的代码</li>
                <li>项目1 - 简单描述你的作品</li>
                <li>项目2 - 简单描述你的作品</li>
            </ul>
            <h2>联系我</h2>
            <p>邮箱：your-email@example.com</p>
        </div>
    </div>
</body>
</html>
